<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>AR Dashboard - TI Espacial Pro</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <link rel="stylesheet" href="css/styles.css?v=23">
    <script src="js/app.js?v=23"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="scanner-ui" class="scanner-container" style="background: transparent; border: none;">
    </div>

    <div id="ui-overlay" class="viewport-overlay" style="display: none;">
        
        <div id="spatial-ui" class="spatial-wrapper">
            
            <div class="glass-panel central-panel">
                <div class="header-logo">Price Shoes <br><span>Soporte TI En Vivo</span></div>
                <div class="kpi-section"></div>
            </div>

            <div id="pods-container" class="glass-panel pods-layer-rect"></div>

            <div class="glass-panel bottom-nav">
                <button class="nav-btn active" onclick="switchTab('helpdesk')"><span>🎧</span> Helpdesk</button>
                <button class="nav-btn" onclick="switchTab('corporativo')"><span>🏢</span> Corpo</button>
                <button class="nav-btn" onclick="switchTab('tiendas')"><span>🏪</span> Tiendas</button>
                <button class="nav-btn" onclick="switchTab('jefes')"><span>👨‍💼</span> Jefes</button>
            </div>
            
        </div>
    </div>

    <div id="tech-modal-overlay" class="modal-overlay" style="display: none;">
        <div id="tech-modal" class="tech-modal">
            <button class="modal-close" onclick="cerrarModalTecnico()">×</button>
            <div id="modal-img" class="modal-profile-img"></div>
            <h2 id="modal-name">Nombre</h2>
            <p id="modal-puesto" class="modal-role">Puesto</p>
            <div class="modal-details">
                <p>📞 <span id="modal-ext"></span></p>
                <p>✉️ <span id="modal-mail"></span></p>
            </div>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-marker type="pattern" url="dashboard.patt" activar-dashboard></a-marker>
        <a-entity camera></a-entity>
    </a-scene>

</body>
</html>
