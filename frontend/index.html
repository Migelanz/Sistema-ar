<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <title>AR Dashboard - Soporte TI</title>
    <link rel="stylesheet" href="css/styles.css?v=29">
    <script src="js/app.js?v=29" defer></script>
</head>
<body>

    <!-- Cámara en vivo de fondo (se activa al tocar Iniciar) -->
    <video id="cam-feed" autoplay playsinline muted></video>
    <div id="cam-dim"></div>

    <!-- Pantalla de inicio / permiso de cámara -->
    <div id="scanner-ui" class="scanner-container">
        <div class="intro-card">
            <div class="intro-logo">📊</div>
            <h1 id="intro-greet">Hola 👋</h1>
            <p class="intro-brand">Price Shoes · Soporte TI</p>
            <p class="intro-sub">Panel de indicadores en Realidad Aumentada</p>
            <button class="btn-iniciar" onclick="iniciarExperiencia()">▶ Iniciar experiencia</button>
            <p id="intro-status" class="intro-status"></p>
        </div>
    </div>

    <!-- Overlay del dashboard -->
    <div id="ui-overlay" class="viewport-overlay" style="display: none;">
        <div id="spatial-ui" class="spatial-wrapper">

            <div class="glass-panel central-panel">
                <div class="header-row">
                    <div class="header-logo">Price Shoes <br><span id="live-status"><i class="live-dot"></i> Soporte TI En Vivo</span></div>
                    <button id="btn-refresh" class="btn-refresh" onclick="refrescarDatos()" title="Actualizar" aria-label="Actualizar">⟳</button>
                </div>

                <div class="time-filters">
                    <button id="btn-tiempo-mes_actual" class="nav-btn active" onclick="switchTiempo('mes_actual')">Mes Actual</button>
                    <button id="btn-tiempo-mes_pasado" class="nav-btn" onclick="switchTiempo('mes_pasado')">Mes Pasado</button>
                    <button id="btn-tiempo-ano" class="nav-btn" onclick="switchTiempo('ano')">Este Año</button>
                </div>

                <div class="kpi-section"></div>
                <div id="last-updated" class="last-updated"></div>
            </div>

            <div id="pods-container" class="glass-panel pods-layer-rect"></div>

            <div class="glass-panel bottom-nav">
                <button class="nav-btn active" onclick="switchTab('helpdesk')"><span>🎧</span> Helpdesk</button>
                <button class="nav-btn" onclick="switchTab('corporativo')"><span>🏢</span> Corpo</button>
                <button class="nav-btn" onclick="switchTab('tiendas')"><span>🏪</span> Tiendas</button>
                <button class="nav-btn" onclick="switchTab('jefes')"><span>👨‍💼</span> Lideres</button>
            </div>

        </div>
    </div>

    <!-- Modal técnico -->
    <div id="tech-modal-overlay" class="modal-overlay" style="display: none;">
        <div id="tech-modal" class="tech-modal">
            <button class="modal-close" onclick="cerrarModalTecnico()">×</button>
            <div id="modal-img" class="modal-profile-img"></div>
            <h2 id="modal-name">Nombre</h2>
            <p id="modal-puesto" class="modal-role">Puesto</p>
            <div class="modal-details">
                <p>📞 <span id="modal-ext"></span></p>
                <p>✉️ <span id="modal-mail"></span></p>
            </div>
        </div>
    </div>
    <!-- Botón flotante: WhatsApp de Help Desk -->
    <a id="wa-fab" class="wa-fab" href="https://wa.link/xukwmn" target="_blank" rel="noopener noreferrer" aria-label="Contactar Help Desk por WhatsApp" style="display:none;">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
            <path d="M12.04 2c-5.5 0-9.96 4.46-9.96 9.96 0 1.76.46 3.48 1.34 5L2 22l5.2-1.36a9.9 9.9 0 0 0 4.84 1.24h.01c5.5 0 9.96-4.46 9.96-9.96 0-2.66-1.04-5.16-2.92-7.04A9.9 9.9 0 0 0 12.04 2zm5.84 14.06c-.25.7-1.44 1.34-1.98 1.42-.53.08-1.02.11-2.5-.52-2.1-.83-3.45-2.95-3.56-3.09-.1-.14-.85-1.13-.85-2.16 0-1.03.54-1.53.73-1.74.19-.21.42-.26.56-.26.14 0 .28 0 .4.01.13.01.3-.05.47.36.18.42.6 1.45.65 1.56.05.11.09.24.02.38-.07.14-.1.23-.21.35-.1.12-.22.27-.31.36-.1.1-.21.21-.09.41.12.21.53.88 1.14 1.42.79.7 1.45.92 1.66 1.03.21.1.33.09.45-.05.12-.14.52-.6.66-.81.14-.21.28-.17.47-.1.19.07 1.2.57 1.41.67.21.1.35.15.4.24.05.09.05.51-.2 1.21z"/>
        </svg>
        <span>Reportar incidencia</span>
    </a>

</body>
</html>
