services:
  ar-dashboard:
    build: .
    image: ar-dashboard:latest
    container_name: ar-dashboard-prod
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    volumes:
      # La DB real vive en backend/. Se monta para que persista fuera del contenedor.
      - ./backend/personal.sqlite:/app/backend/personal.sqlite
      - ./frontend/img/uploads:/app/frontend/img/uploads
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/personal"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
